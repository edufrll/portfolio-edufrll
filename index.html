<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Abrir link</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      display: grid;
      place-items: center;
      width: min(100%, 420px);
      min-height: 64px;
      padding: 18px 24px;
      border-radius: 18px;
      background: #111;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s ease, opacity .12s ease;
    }

    a:active {
      transform: scale(.97);
      opacity: .86;
    }
  </style>
</head>
<body>
  <a href="https://oia.99app.com/dlp9/L9xFfQ">abrir link</a>
</body>
</html>
